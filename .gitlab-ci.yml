stages:
  - build
  - push

default:
  image: docker:latest
  services:
    - docker:dind

variables:
  IMAGE_NAME: "$ACR_LOGIN_SERVER/driverflyfrontend:latest"

build:
  stage: build
  script:
    - echo "Building Docker image..."
    - docker login $ACR_LOGIN_SERVER -u $ACR_USERNAME -p $ACR_PASSWORD
    - docker build -t $IMAGE_NAME .
    - docker push $IMAGE_NAME
  only:
    - main 