stages:
  - build
  - push

default:
  image: docker:latest
  services:
    - docker:dind

variables:
  IMAGE_NAME: "$ACR_LOGIN_SERVER/driverflyfrontend:latest"
  # Required so docker-in-docker works without TLS certs
  DOCKER_TLS_CERTDIR: ""

build:
  stage: build
  script:
    - echo "Building Docker image..."
    - docker login $ACR_LOGIN_SERVER -u $ACR_USERNAME -p $ACR_PASSWORD
    - |
      echo "Validating required env vars..."
      required="BASE_URL FRONTEND_BASE_URL BASE_URL_API"
      for v in $required; do
        val=$(printenv "$v")
        if [ -z "$val" ]; then
          echo "ERROR: Missing required CI variable: $v"; exit 1
        else
          echo "OK: $v present"
        fi
      done
      optional="RECAPTCHA_SITE_KEY RECAPTCHA_SECRET_KEY NEXT_PUBLIC_MICROSOFT_CLARITY MAPBOX_API_KEY TWILIO_APP_NAME PHONE_INPUT_COUNTRY_ALLOWED NEXT_PUBLIC_GOOGLE_ANALYTICS"
      for v in $optional; do
        val=$(printenv "$v")
        if [ -z "$val" ]; then
          echo "WARN: Optional CI variable not set: $v"
        fi
      done
      echo "Using BASE_URL_API=$BASE_URL_API"
      echo "\nEnv snapshot (non-sensitive values):"
      echo "BASE_URL=$BASE_URL"
      echo "FRONTEND_BASE_URL=$FRONTEND_BASE_URL"
      echo "BASE_URL_API=$BASE_URL_API"
      echo "NEXT_PUBLIC_BASE_URL_API=$BASE_URL_API"
      echo "NEXT_PUBLIC_BASE_URL=$BASE_URL"
      echo "NEXT_PUBLIC_FRONTEND_BASE_URL=$FRONTEND_BASE_URL"
      echo "NEXT_PUBLIC_MICROSOFT_CLARITY=$NEXT_PUBLIC_MICROSOFT_CLARITY"
      echo "NEXT_PUBLIC_GOOGLE_ANALYTICS=$NEXT_PUBLIC_GOOGLE_ANALYTICS"
      echo "RECAPTCHA_SITE_KEY=$RECAPTCHA_SITE_KEY"
      echo "PHONE_INPUT_COUNTRY_ALLOWED=$PHONE_INPUT_COUNTRY_ALLOWED"
      # Sensitive values are not printed to avoid leaking secrets
      for v in MAPBOX_API_KEY RECAPTCHA_SECRET_KEY TWILIO_APP_NAME; do
        if [ -n "$(printenv "$v")" ]; then
          echo "$v is set"
        else
          echo "$v is not set"
        fi
      done
    - |
      docker build --no-cache \
        --build-arg BASE_URL="$BASE_URL" \
        --build-arg FRONTEND_BASE_URL="$FRONTEND_BASE_URL" \
        --build-arg BASE_URL_API="$BASE_URL_API" \
        --build-arg NEXT_PUBLIC_BASE_URL_API="$BASE_URL_API" \
        --build-arg MAPBOX_API_KEY="$MAPBOX_API_KEY" \
        --build-arg NEXT_PUBLIC_MICROSOFT_CLARITY="$NEXT_PUBLIC_MICROSOFT_CLARITY" \
        --build-arg RECAPTCHA_SITE_KEY="$RECAPTCHA_SITE_KEY" \
        --build-arg RECAPTCHA_SECRET_KEY="$RECAPTCHA_SECRET_KEY" \
        --build-arg TWILIO_APP_NAME="$TWILIO_APP_NAME" \
        --build-arg PHONE_INPUT_COUNTRY_ALLOWED="$PHONE_INPUT_COUNTRY_ALLOWED" \
        --build-arg NEXT_PUBLIC_GOOGLE_ANALYTICS="$NEXT_PUBLIC_GOOGLE_ANALYTICS" \
        -t $IMAGE_NAME .
    - docker push $IMAGE_NAME
  only:
    - main 